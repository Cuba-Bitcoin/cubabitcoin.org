name: Docker Build & Publish

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - 'img/**'
      - 'docker/**'
      - '!docker/ssl/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-container ghcr.io/${{ github.repository }}:${{ github.sha }}
          sleep 5
          if docker inspect --format='{{.State.Health.Status}}' test-container 2>/dev/null | grep -q "healthy"; then
            echo "Container is healthy"
          elif docker inspect --format='{{.State.Running}}' test-container | grep -q "true"; then
            echo "Container is running"
          else
            echo "Container failed to start"
            docker logs test-container
            exit 1
          fi
          docker rm -f test-container
